name: focient
description: AI-powered productivity application.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.3.0

  # Date & Time
  intl: ^0.20.2

  # SVG
  flutter_svg: ^2.2.1

  # Local Storage
  shared_preferences: ^2.5.3

  # UUID
  uuid: ^4.5.1

  # JSON Annotation (optional)
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.6.0
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true

  assets:
    - lib/app/assets/data/
    - lib/app/assets/flags/
    - lib/app/assets/icon/
    - lib/app/assets/images/
    - lib/app/assets/illustrations/

  fonts:
    - family: Inter
      fonts:
        - asset: lib/app/assets/font/inter-regular.ttf
          weight: 400
        - asset: lib/app/assets/font/inter-medium.ttf
          weight: 500
        - asset: lib/app/assets/font/inter-semibold.ttf
          weight: 600
        - asset: lib/app/assets/font/inter-bold.ttf
          weight: 700
